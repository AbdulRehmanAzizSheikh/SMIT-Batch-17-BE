<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Image Zoom Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        user-select: none;
        touch-action: none;
        -webkit-touch-callout: none;
      }

      /* ── Toolbar ── */
      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        background: #1a1a1a;
        border-bottom: 1px solid #2a2a2a;
        width: 100%;
        flex-wrap: wrap;
        justify-content: center;
      }

      .toolbar .group {
        display: flex;
        align-items: center;
        gap: 6px;
        background: #222;
        border-radius: 8px;
        padding: 4px 8px;
      }

      .toolbar button {
        background: #2a2a2a;
        color: #e0e0e0;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        padding: 7px 14px;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.2s,
          border-color 0.2s,
          transform 0.1s;
      }

      .toolbar button:hover {
        background: #3a3a3a;
        border-color: #5a5a5a;
      }

      .toolbar button:active {
        transform: scale(0.95);
      }

      .toolbar input[type="number"] {
        width: 60px;
        padding: 6px 8px;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        background: #1a1a1a;
        color: #e0e0e0;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        text-align: center;
        outline: none;
        transition: border-color 0.2s;
      }

      .toolbar input[type="number"]:focus {
        border-color: #6c8cff;
      }

      .toolbar label {
        font-size: 13px;
        color: #888;
      }

      .zoom-level {
        font-size: 13px;
        color: #6c8cff;
        min-width: 50px;
        text-align: center;
        font-weight: 600;
      }

      /* ── Canvas Container ── */
      .canvas-container {
        flex: 1;
        width: 100%;
        position: relative;
        overflow: hidden;
        cursor: grab;
        background: #111;
        /* Checkerboard pattern for transparency */
        background-image:
          linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
          linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
          linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
        background-size: 20px 20px;
        background-position:
          0 0,
          0 10px,
          10px -10px,
          -10px 0;
      }

      .canvas-container.dragging {
        cursor: grabbing;
      }

      canvas {
        position: absolute;
        top: 0;
        left: 0;
      }

      /* ── Status bar ── */
      .status-bar {
        width: 100%;
        padding: 6px 16px;
        background: #1a1a1a;
        border-top: 1px solid #2a2a2a;
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #666;
      }

      /* ── Hint overlay ── */
      .hint {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(8px);
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 12px;
        color: #888;
        pointer-events: none;
        opacity: 1;
        transition: opacity 1s;
      }

      .hint.hidden {
        opacity: 0;
      }

      /* ── Responsive: Tablet (≤768px) ── */
      @media (max-width: 768px) {
        .toolbar {
          padding: 6px 8px;
          gap: 4px;
        }
        .toolbar .group {
          gap: 4px;
          padding: 3px 6px;
        }
        .toolbar button {
          padding: 6px 10px;
          font-size: 13px;
        }
        .toolbar input[type="number"] {
          width: 50px;
          padding: 5px 4px;
          font-size: 13px;
        }
        .toolbar label {
          font-size: 12px;
        }
        .status-bar {
          font-size: 11px;
          padding: 4px 10px;
        }
        .hint {
          font-size: 11px;
          padding: 6px 12px;
        }
      }

      /* ── Responsive: Mobile (≤480px) ── */
      @media (max-width: 480px) {
        .toolbar {
          padding: 4px 4px;
          gap: 3px;
        }
        .toolbar .group {
          gap: 3px;
          padding: 2px 4px;
          border-radius: 6px;
        }
        .toolbar button {
          padding: 5px 8px;
          font-size: 11px;
          border-radius: 4px;
        }
        .toolbar input[type="number"] {
          width: 40px;
          padding: 4px 2px;
          font-size: 11px;
          border-radius: 4px;
        }
        .toolbar label {
          font-size: 10px;
        }
        .status-bar {
          font-size: 10px;
          padding: 3px 6px;
        }
        .hint {
          font-size: 10px;
          padding: 5px 10px;
          bottom: 30px;
        }
      }

      /* ── Responsive: Small Mobile (≤360px) ── */
      @media (max-width: 360px) {
        .toolbar button {
          padding: 4px 6px;
          font-size: 10px;
        }
        .toolbar input[type="number"] {
          width: 36px;
          font-size: 10px;
        }
        .toolbar label {
          font-size: 9px;
        }
      }

      /* ── Responsive: Smartwatch (≤200px) ── */
      @media (max-width: 200px) {
        .toolbar {
          padding: 2px;
          gap: 2px;
          flex-direction: column;
        }
        .toolbar .group {
          gap: 2px;
          padding: 1px 2px;
          flex-wrap: wrap;
          justify-content: center;
        }
        .toolbar button {
          padding: 2px 4px;
          font-size: 8px;
          min-width: 20px;
        }
        .toolbar input[type="number"] {
          width: 28px;
          padding: 2px 1px;
          font-size: 8px;
        }
        .toolbar label {
          font-size: 7px;
        }
        .status-bar {
          display: none;
        }
        .hint {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="group">
        <button id="prev" title="Previous Image">&#10094;</button>
        <label>Image</label>
        <input id="imageNumber" type="number" min="1" max="352" value="1" />
        <label>/ 352</label>
        <button id="goTo">Go</button>
        <button id="next" title="Next Image">&#10095;</button>
      </div>

      <div class="group">
        <button id="zoomOut" title="Zoom Out (-)">&#8722;</button>
        <input
          id="zoomInput"
          type="number"
          min="10"
          max="2000"
          value="100"
          title="Type zoom % and press Enter"
        />
        <label>%</label>
        <button id="zoomIn" title="Zoom In (+)">&#43;</button>
        <button id="fitBtn" title="Fit to Screen">Fit</button>
        <button id="resetBtn" title="Reset to 100%">1:1</button>
      </div>
    </div>

    <!-- Canvas -->
    <div class="canvas-container" id="canvasContainer">
      <canvas id="canvas"></canvas>
      <div class="hint" id="hint">
        <span class="hint-desktop"
          >Scroll to zoom &bull; Drag to pan &bull; ←→ change image &bull; ↑↓
          zoom &bull; Double-click to reset</span
        >
        <span class="hint-touch"
          >Pinch to zoom &bull; Drag to pan &bull; Double-tap to reset</span
        >
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <span id="statusLeft">Loading...</span>
      <span id="statusRight"></span>
    </div>

    <script>
      // ── Elements ──
      const canvasContainer = document.getElementById("canvasContainer");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const zoomInput = document.getElementById("zoomInput");
      const statusLeft = document.getElementById("statusLeft");
      const statusRight = document.getElementById("statusRight");
      const imageNumberInput = document.getElementById("imageNumber");
      const hintEl = document.getElementById("hint");

      // ── State ──
      let img = new Image();
      let currentImage = 1;
      let scale = 1;
      let offsetX = 0;
      let offsetY = 0;
      let isDragging = false;
      let dragStartX = 0;
      let dragStartY = 0;
      let lastOffsetX = 0;
      let lastOffsetY = 0;
      const MIN_SCALE = 0.1;
      const MAX_SCALE = 20;
      const ZOOM_STEP = 0.15; // 15% per click/scroll

      // Hide hint after 4 seconds
      setTimeout(() => hintEl.classList.add("hidden"), 4000);

      // ── Load Image ──
      let isFirstLoad = true;
      function loadImage(num) {
        currentImage = num;
        imageNumberInput.value = num;
        statusLeft.textContent = "Loading...";

        const newImg = new Image();
        newImg.onload = function () {
          img = newImg;
          statusLeft.textContent = `Image ${num} — ${img.naturalWidth} × ${img.naturalHeight}`;
          if (isFirstLoad) {
            fitToScreen();
            isFirstLoad = false;
          } else {
            draw(); // keep current zoom & position
          }
        };
        newImg.onerror = function () {
          statusLeft.textContent = `Image ${num} — failed to load`;
        };
        newImg.src = `${num}.png`;
      }

      // ── Drawing ──
      function draw() {
        canvas.width = canvasContainer.clientWidth;
        canvas.height = canvasContainer.clientHeight;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.drawImage(img, 0, 0);
        ctx.restore();

        // Update zoom level display
        zoomInput.value = Math.round(scale * 100);
        statusRight.textContent = `Zoom: ${Math.round(scale * 100)}%`;
      }

      // ── Fit to Screen ──
      function fitToScreen() {
        if (!img.naturalWidth) return;
        const cw = canvasContainer.clientWidth;
        const ch = canvasContainer.clientHeight;
        const scaleX = cw / img.naturalWidth;
        const scaleY = ch / img.naturalHeight;
        scale = Math.min(scaleX, scaleY) * 0.95; // 95% to leave a small margin
        // Center the image
        offsetX = (cw - img.naturalWidth * scale) / 2;
        offsetY = (ch - img.naturalHeight * scale) / 2;
        draw();
      }

      // ── Zoom around a point ──
      function zoomAt(pointX, pointY, factor) {
        const newScale = Math.min(
          MAX_SCALE,
          Math.max(MIN_SCALE, scale * factor),
        );
        const ratio = newScale / scale;

        // Adjust offset so the point stays under the cursor
        offsetX = pointX - (pointX - offsetX) * ratio;
        offsetY = pointY - (pointY - offsetY) * ratio;
        scale = newScale;
        draw();
      }

      // ── Mouse Wheel Zoom ──
      canvasContainer.addEventListener(
        "wheel",
        (e) => {
          e.preventDefault();
          const rect = canvasContainer.getBoundingClientRect();
          const mx = e.clientX - rect.left;
          const my = e.clientY - rect.top;
          const factor = e.deltaY < 0 ? 1 + ZOOM_STEP : 1 / (1 + ZOOM_STEP);
          zoomAt(mx, my, factor);
        },
        { passive: false },
      );

      // ── Drag to Pan ──
      canvasContainer.addEventListener("mousedown", (e) => {
        isDragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        lastOffsetX = offsetX;
        lastOffsetY = offsetY;
        canvasContainer.classList.add("dragging");
      });

      window.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        offsetX = lastOffsetX + (e.clientX - dragStartX);
        offsetY = lastOffsetY + (e.clientY - dragStartY);
        draw();
      });

      window.addEventListener("mouseup", () => {
        isDragging = false;
        canvasContainer.classList.remove("dragging");
      });

      // ── Double-click to reset ──
      canvasContainer.addEventListener("dblclick", () => {
        fitToScreen();
      });

      // ── Toolbar Buttons ──
      document.getElementById("zoomIn").addEventListener("click", () => {
        const cx = canvasContainer.clientWidth / 2;
        const cy = canvasContainer.clientHeight / 2;
        zoomAt(cx, cy, 1 + ZOOM_STEP);
      });

      document.getElementById("zoomOut").addEventListener("click", () => {
        const cx = canvasContainer.clientWidth / 2;
        const cy = canvasContainer.clientHeight / 2;
        zoomAt(cx, cy, 1 / (1 + ZOOM_STEP));
      });

      document.getElementById("fitBtn").addEventListener("click", fitToScreen);

      document.getElementById("resetBtn").addEventListener("click", () => {
        scale = 1;
        // Center at 1:1
        offsetX = (canvasContainer.clientWidth - img.naturalWidth) / 2;
        offsetY = (canvasContainer.clientHeight - img.naturalHeight) / 2;
        draw();
      });

      document.getElementById("prev").addEventListener("click", () => {
        if (currentImage > 1) loadImage(currentImage - 1);
      });

      document.getElementById("next").addEventListener("click", () => {
        if (currentImage < 352) loadImage(currentImage + 1);
      });

      document.getElementById("goTo").addEventListener("click", () => {
        const val = Number(imageNumberInput.value);
        if (val >= 1 && val <= 352) loadImage(val);
      });

      // ── Zoom Input (live on change) ──
      zoomInput.addEventListener("input", () => {
        const val = Number(zoomInput.value);
        if (val >= 10 && val <= 2000) {
          const newScale = val / 100;
          const cx = canvasContainer.clientWidth / 2;
          const cy = canvasContainer.clientHeight / 2;
          // Zoom centered
          offsetX = cx - (cx - offsetX) * (newScale / scale);
          offsetY = cy - (cy - offsetY) * (newScale / scale);
          scale = newScale;

          // Draw without updating input value (to not interrupt typing)
          canvas.width = canvasContainer.clientWidth;
          canvas.height = canvasContainer.clientHeight;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.save();
          ctx.translate(offsetX, offsetY);
          ctx.scale(scale, scale);
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = "high";
          ctx.drawImage(img, 0, 0);
          ctx.restore();
          statusRight.textContent = `Zoom: ${Math.round(scale * 100)}%`;
        }
      });

      // ── Keyboard Shortcuts ──
      window.addEventListener("keydown", (e) => {
        // Don't capture when typing in input
        if (e.target === imageNumberInput || e.target === zoomInput) return;

        switch (e.key) {
          case "+":
          case "=": {
            const cx = canvasContainer.clientWidth / 2;
            const cy = canvasContainer.clientHeight / 2;
            zoomAt(cx, cy, 1 + ZOOM_STEP);
            break;
          }
          case "-": {
            const cx = canvasContainer.clientWidth / 2;
            const cy = canvasContainer.clientHeight / 2;
            zoomAt(cx, cy, 1 / (1 + ZOOM_STEP));
            break;
          }
          case "0":
            fitToScreen();
            break;
          case "ArrowUp": {
            e.preventDefault();
            const cx = canvasContainer.clientWidth / 2;
            const cy = canvasContainer.clientHeight / 2;
            zoomAt(cx, cy, 1 + ZOOM_STEP);
            break;
          }
          case "ArrowDown": {
            e.preventDefault();
            const cx = canvasContainer.clientWidth / 2;
            const cy = canvasContainer.clientHeight / 2;
            zoomAt(cx, cy, 1 / (1 + ZOOM_STEP));
            break;
          }
          case "ArrowLeft":
            if (currentImage > 1) loadImage(currentImage - 1);
            break;
          case "ArrowRight":
            if (currentImage < 352) loadImage(currentImage + 1);
            break;
        }
      });

      // ── Touch: Drag to Pan ──
      canvasContainer.addEventListener(
        "touchstart",
        (e) => {
          if (e.touches.length === 1) {
            isDragging = true;
            dragStartX = e.touches[0].clientX;
            dragStartY = e.touches[0].clientY;
            lastOffsetX = offsetX;
            lastOffsetY = offsetY;
            canvasContainer.classList.add("dragging");
          }
          if (e.touches.length === 2) {
            isDragging = false;
            lastPinchDist = getPinchDist(e);
            lastPinchCenterX =
              (e.touches[0].clientX + e.touches[1].clientX) / 2;
            lastPinchCenterY =
              (e.touches[0].clientY + e.touches[1].clientY) / 2;
          }
          e.preventDefault();
        },
        { passive: false },
      );

      canvasContainer.addEventListener(
        "touchmove",
        (e) => {
          if (e.touches.length === 1 && isDragging) {
            offsetX = lastOffsetX + (e.touches[0].clientX - dragStartX);
            offsetY = lastOffsetY + (e.touches[0].clientY - dragStartY);
            draw();
          }
          if (e.touches.length === 2) {
            const dist = getPinchDist(e);
            const factor = dist / lastPinchDist;
            const rect = canvasContainer.getBoundingClientRect();
            const cx =
              (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
            const cy =
              (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
            zoomAt(cx, cy, factor);
            lastPinchDist = dist;
          }
          e.preventDefault();
        },
        { passive: false },
      );

      canvasContainer.addEventListener("touchend", (e) => {
        isDragging = false;
        canvasContainer.classList.remove("dragging");
      });

      // Pinch distance helper
      let lastPinchDist = 0;
      let lastPinchCenterX = 0;
      let lastPinchCenterY = 0;
      function getPinchDist(e) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
      }

      // ── Double-tap to fit (touch) ──
      let lastTap = 0;
      canvasContainer.addEventListener("touchend", (e) => {
        const now = Date.now();
        if (now - lastTap < 300) {
          fitToScreen();
        }
        lastTap = now;
      });

      // ── Show correct hint based on device ──
      const isTouchDevice =
        "ontouchstart" in window || navigator.maxTouchPoints > 0;
      const hintDesktop = document.querySelector(".hint-desktop");
      const hintTouch = document.querySelector(".hint-touch");
      if (isTouchDevice) {
        if (hintDesktop) hintDesktop.style.display = "none";
        if (hintTouch) hintTouch.style.display = "inline";
      } else {
        if (hintDesktop) hintDesktop.style.display = "inline";
        if (hintTouch) hintTouch.style.display = "none";
      }

      // ── Resize Handling ──
      window.addEventListener("resize", () => {
        draw();
      });

      // ── Initial Load ──
      loadImage(1);
    </script>
  </body>
</html>
